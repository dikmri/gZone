name: リリース

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            platform: linux/amd64
            asset: gZone_linux_amd64
            binary: build/bin/gZone

          - os: windows-latest
            platform: windows/amd64
            asset: gZone_windows_amd64.exe
            binary: build/bin/gZone.exe

          - os: macos-13
            platform: darwin/amd64
            asset: gZone_darwin_amd64
            binary: build/bin/gZone.app/Contents/MacOS/gZone

          - os: macos-latest
            platform: darwin/arm64
            asset: gZone_darwin_arm64
            binary: build/bin/gZone.app/Contents/MacOS/gZone

    runs-on: ${{ matrix.os }}

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: Go セットアップ
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Wails インストール
        run: go install github.com/wailsapp/wails/v2/cmd/wails@v2.12.0

      - name: Linux 依存パッケージ
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.0-dev nsis

      - name: ビルド (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: wails build -platform ${{ matrix.platform }} -tags native_webview2loader -ldflags "-X main.Version=${{ github.ref_name }}"

      - name: ビルド (Linux / macOS)
        if: matrix.os != 'windows-latest'
        run: wails build -platform ${{ matrix.platform }} -ldflags "-X main.Version=${{ github.ref_name }}"

      # ── アーティファクト準備 ──────────────────────────

      - name: アーティファクト準備 (Linux)
        if: matrix.os == 'ubuntu-latest'
        run: cp "${{ matrix.binary }}" "${{ matrix.asset }}"

      - name: アーティファクト準備 (Windows)
        if: matrix.os == 'windows-latest'
        shell: pwsh
        run: Copy-Item "${{ matrix.binary }}" "${{ matrix.asset }}"

      - name: アーティファクト準備 (macOS バイナリ)
        if: startsWith(matrix.os, 'macos')
        run: |
          cp "${{ matrix.binary }}" "${{ matrix.asset }}"
          chmod +x "${{ matrix.asset }}"
          # .app バンドルも tar.gz で配布（初回インストール用）
          cd build/bin && tar czf "../../${{ matrix.asset }}.app.tar.gz" gZone.app

      - name: アーティファクトアップロード (バイナリ)
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}
          path: ${{ matrix.asset }}

      - name: アーティファクトアップロード (macOS .app)
        if: startsWith(matrix.os, 'macos')
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.asset }}.app.tar.gz
          path: ${{ matrix.asset }}.app.tar.gz

  # ── リリース作成 ────────────────────────────────────
  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: チェックアウト
        uses: actions/checkout@v4

      - name: アーティファクトのダウンロード
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: ファイル一覧
        run: ls -lh dist/

      - name: GitHub リリース作成
        uses: softprops/action-gh-release@v2
        with:
          draft: false
          prerelease: ${{ contains(github.ref_name, '-') }}
          files: dist/*
          body: |
            ## インストール / アップデート

            ### Windows (PowerShell)
            ```powershell
            irm https://raw.githubusercontent.com/dikmri/gZone/main/scripts/install.ps1 | iex
            ```

            ### macOS / Linux
            ```bash
            curl -fsSL https://raw.githubusercontent.com/dikmri/gZone/main/scripts/install.sh | sh
            ```

            ### 手動ダウンロード
            | プラットフォーム | ファイル |
            |---|---|
            | Windows (x64) | `gZone_windows_amd64.exe` |
            | macOS (Apple Silicon) | `gZone_darwin_arm64.app.tar.gz` |
            | macOS (Intel) | `gZone_darwin_amd64.app.tar.gz` |
            | Linux (x64) | `gZone_linux_amd64` |

            ---
            詳細は [CHANGELOG.md](https://github.com/dikmri/gZone/blob/main/CHANGELOG.md) を参照してください。
