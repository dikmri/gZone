<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>gZone</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #111;
      color: #eee;
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      user-select: none;
      -webkit-user-select: none;
    }

    ::-webkit-scrollbar { width: 5px; }
    ::-webkit-scrollbar-track { background: transparent; }
    ::-webkit-scrollbar-thumb { background: #333; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #555; }

    /* ─── アップデート画面 ───────────────────────────── */
    #update-screen {
      position: fixed; inset: 0; z-index: 9999;
      background: #111;
      display: flex; align-items: center; justify-content: center;
    }
    #update-screen.hidden { display: none; }
    .update-box {
      display: flex; flex-direction: column; align-items: center; gap: 18px;
      padding: 40px 60px;
      background: #181818; border: 1px solid #252525; border-radius: 12px;
      min-width: 320px;
    }
    .update-logo { font-size: 28px; font-weight: 800; letter-spacing: 0.06em; color: #fff; }
    #update-msg  { font-size: 13px; color: #aaa; }
    .update-bar-wrap {
      width: 100%; height: 3px; background: #252525; border-radius: 2px; overflow: hidden;
      display: none;
    }
    .update-bar-wrap.visible { display: block; }
    #update-bar { height: 100%; width: 0%; background: #3a8eff; border-radius: 2px; transition: width 0.2s; }
    #update-version { font-size: 11px; color: #555; }

    #root { display: flex; flex-direction: column; height: 100vh; }

    /* ─── Header ─────────────────────────────────── */
    header {
      display: flex; align-items: center; gap: 12px;
      padding: 0 14px; height: 44px;
      background: #181818;
      border-bottom: 1px solid #252525;
      flex-shrink: 0;
    }
    .h-left  { display: flex; align-items: center; gap: 8px; flex-shrink: 0; }
    .h-center { flex: 1; min-width: 0; text-align: center; }
    .h-right  { display: flex; align-items: center; gap: 10px; flex-shrink: 0; }

    .title { font-size: 17px; font-weight: 700; letter-spacing: 0.05em; color: #fff; }
    #total-count { font-size: 11px; color: #555; }
    #folder-name {
      font-size: 12px; color: #666;
      display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
    }

    .size-ctrl { display: flex; align-items: center; gap: 6px; font-size: 11px; color: #666; }
    #size-range { width: 90px; cursor: pointer; accent-color: #3a8eff; }
    #size-val   { min-width: 24px; text-align: right; font-size: 11px; color: #888; }

    #open-btn {
      padding: 5px 14px;
      background: #1a4080; border: 1px solid #2a5ab0; border-radius: 5px;
      color: #a8cfff; cursor: pointer; font-size: 12px; font-weight: 600;
      white-space: nowrap; transition: background 0.12s;
    }
    #open-btn:hover:not(:disabled) { background: #1e4e9a; color: #c8e0ff; }
    #open-btn:disabled { opacity: 0.4; cursor: default; }

    /* ─── Main ───────────────────────────────────── */
    main { flex: 1; overflow: hidden; }

    #empty {
      display: flex; flex-direction: column; align-items: center;
      justify-content: center; height: 100%; gap: 20px;
    }
    #empty p { font-size: 15px; color: #888; }
    #empty-btn {
      padding: 12px 32px;
      background: #1a4080; border: 1px solid #2a5ab0; border-radius: 8px;
      color: #a8cfff; cursor: pointer; font-size: 15px; font-weight: 600;
      transition: background 0.12s;
    }
    #empty-btn:hover:not(:disabled) { background: #1e4e9a; color: #c8e0ff; }
    #empty-btn:disabled { opacity: 0.4; cursor: default; }

    /* ─── Grid ───────────────────────────────────── */
    #grid {
      --cs: 280px;
      display: none;
      height: 100%;
      overflow-y: auto;
      grid-template-columns: repeat(auto-fill, minmax(var(--cs), 1fr));
      gap: 2px;
      padding: 2px;
      align-content: start;
      /* カードがお互いの高さに引き伸ばされないようにする */
      align-items: start;
    }

    /* ─── Card ───────────────────────────────────── */
    .card {
      /*
       * padding-bottom % は常に「横幅」に対する割合。
       * height:0 + padding-bottom:XX% で「横幅×XX%」の高さを作る古典的手法。
       * border-box だと padding が height:0 に押し潰されるので content-box を使う。
       */
      box-sizing: content-box;
      position: relative;
      height: 0;
      padding-bottom: 56.25%; /* 16:9 デフォルト。loadedmetadata で実比率に更新 */
      background: #181818;
      overflow: hidden;
      /* CSS 包含: カード内のレイアウト/スタイル変化が外に伝搬しないようにし描画コストを削減 */
      contain: layout style;
    }
    .card:hover {
      outline: 1.5px solid rgba(58,142,255,0.35);
      outline-offset: -1.5px;
    }
    .card video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover; /* 比率一致後はクリップなし。不一致の一瞬だけ cover */
      display: block;
    }

    /* ─── スピナー ───────────────────────────────── */
    .card-spin {
      position: absolute; inset: 0;
      display: flex; align-items: center; justify-content: center;
      pointer-events: none;
    }
    .ring {
      width: 24px; height: 24px;
      border: 2.5px solid rgba(255,255,255,0.08);
      border-top-color: rgba(58,142,255,0.75);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }
    .loading-row {
      grid-column: 1 / -1;
      display: flex; align-items: center; justify-content: center; height: 48px;
    }
    .loading-row .ring { width: 28px; height: 28px; border-width: 3px; }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ─── Sentinel ───────────────────────────────── */
    #sentinel { grid-column: 1 / -1; height: 1px; }

    /* ─── コンテキストメニュー ────────────────────── */
    #ctx-menu {
      position: fixed; z-index: 9500;
      background: #1e1e1e; border: 1px solid #333;
      border-radius: 7px; padding: 4px 0;
      min-width: 170px;
      box-shadow: 0 6px 20px rgba(0,0,0,0.7);
      display: none; user-select: none; -webkit-user-select: none;
    }
    #ctx-menu.show { display: block; }
    .ctx-item {
      padding: 7px 16px; cursor: pointer; font-size: 12px; color: #ccc;
      white-space: nowrap; transition: background 0.08s;
    }
    .ctx-item:hover { background: #2a2a2a; color: #fff; }
    .ctx-item.danger { color: #ff6b6b; }
    .ctx-item.danger:hover { background: #3a1010; color: #ff9090; }
    .ctx-sep { height: 1px; background: #2e2e2e; margin: 4px 0; }

    /* ドラッグ中のカードをやや透明にして掴んでいる感を出す */
    .card.dragging { opacity: 0.55; }
  </style>
</head>
<body>
  <!-- アップデート確認中はこの画面が表示される -->
  <div id="update-screen">
    <div class="update-box">
      <div class="update-logo">gZone</div>
      <div id="update-msg">アップデートを確認中...</div>
      <div class="update-bar-wrap" id="update-bar-wrap">
        <div id="update-bar"></div>
      </div>
      <div id="update-version"></div>
    </div>
  </div>

  <div id="root">
    <header>
      <div class="h-left">
        <span class="title">gZone</span>
        <span id="total-count"></span>
      </div>
      <div class="h-center">
        <span id="folder-name"></span>
      </div>
      <div class="h-right">
        <label class="size-ctrl">
          <span>サイズ</span>
          <input id="size-range" type="range" min="100" max="600" step="10" value="280" />
          <span id="size-val">280</span>
        </label>
        <button id="open-btn">フォルダを開く</button>
      </div>
    </header>

    <main>
      <div id="empty">
        <p>フォルダを選択して動画を表示します</p>
        <button id="empty-btn">フォルダを開く</button>
      </div>
      <div id="grid"></div>
    </main>
  </div>

  <!-- 右クリックコンテキストメニュー -->
  <div id="ctx-menu">
    <div class="ctx-item" id="ctx-reveal">エクスプローラーで表示</div>
    <div class="ctx-item" id="ctx-copy-path">パスをコピー</div>
    <div class="ctx-sep"></div>
    <div class="ctx-item danger" id="ctx-delete">削除</div>
  </div>

  <script>
    'use strict';

    const BATCH = 24;

    // ── パフォーマンス定数 ────────────────────────────
    // フリーズの根本原因は video.load() の同期実行だったので requestIdleCallback で解決済み
    // MAX_LOADS は「同時にデコーダを初期化する数」の上限（無制限だと多数同時でフリーズする）
    const MAX_LOADS      = 6;      // 3は遅すぎ、無制限はフリーズ → 6が現実的な落とし所
    const LOAD_MARGIN    = '500px'; // 広めに先読み（スクロール中でも積極的にプリロード）
    const RELEASE_MARGIN = '900px'; // この距離を超えたら src を解放

    // ── グローバル状態 ───────────────────────────────
    let folderPath  = '';
    let videoPort   = 0;
    let totalCount  = 0;
    let offset      = 0;
    let isLoading   = false;
    let sentinelObs = null;
    let loadObs     = null;
    let playObs     = null;
    let releaseObs  = null;

    // ── ロードキュー ──────────────────────────────────
    let activeLoads = 0;
    let queueHead   = 0;
    const queueArr  = [];
    const queueSet  = new Set();

    function enqueue(card) {
      if (queueSet.has(card)) return;
      queueSet.add(card);
      queueArr.push(card);
      flush();
    }

    function dequeue(card) {
      queueSet.delete(card); // flush 時にポインタで読み飛ばされる
    }

    function flush() {
      // ※ isScrollFast チェックなし — スクロール中も積極的にロードする
      while (queueHead < queueArr.length && activeLoads < MAX_LOADS) {
        const card = queueArr[queueHead++];
        if (!queueSet.has(card)) continue;        // dequeue 済み
        queueSet.delete(card);
        if (!card.isConnected || card._video.src) continue;
        startLoad(card);
      }
      if (queueHead > 64) { queueArr.splice(0, queueHead); queueHead = 0; }
    }

    function startLoad(card) {
      // 同一カードが再キューされた場合、前回のスロットを確実に解放してから開始
      if (card._releaseSlot) { card._releaseSlot(); }

      const video = card._video;

      // 前回のリスナー残骸をクリア（abort/emptied フォールスポジティブ対策）
      if (card._onCanplay) { video.removeEventListener('canplay', card._onCanplay); }
      if (card._onError)   { video.removeEventListener('error',   card._onError);   }

      activeLoads++;

      let done = false;
      const releaseSlot = () => {
        clearTimeout(timer);
        if (done) return;
        done = true;
        card._releaseSlot = null;
        activeLoads = Math.max(0, activeLoads - 1);
        flush();
      };
      card._releaseSlot = releaseSlot;
      // 8秒で強制タイムアウト（stall 時にスロットが永久に塞がらないようにする）
      const timer = setTimeout(releaseSlot, 8000);

      card._onCanplay = () => {
        card._onCanplay = card._onError = null;
        card._spin.style.display = 'none';
        releaseSlot();
        if (card._inVP && card.isConnected) video.play().catch(() => {});
      };
      card._onError = () => {
        card._onCanplay = card._onError = null;
        card._spin.style.display = 'none';
        releaseSlot();
      };
      // abort/emptied は WebView2 でフォールスポジティブが多いため使用しない
      // スロット解放は canplay / error / timeout / 明示的 releaseSlot() のみ
      video.addEventListener('canplay', card._onCanplay, { once: true });
      video.addEventListener('error',   card._onError,   { once: true });

      card._spin.style.display = 'flex';
      video.src = card._url;
    }

    function releaseCard(card) {
      dequeue(card);
      const video = card._video;
      if (!video.src) return;

      // ロード中ならスロットを明示的に解放し、リスナーも除去
      if (card._releaseSlot) { card._releaseSlot(); }
      if (card._onCanplay) { video.removeEventListener('canplay', card._onCanplay); card._onCanplay = null; }
      if (card._onError)   { video.removeEventListener('error',   card._onError);   card._onError   = null; }

      card._inVP = false;
      video.pause();
      video.removeAttribute('src'); // src='' はベースURLに解決されるため removeAttribute を使う
      card._spin.style.display = 'none';
      if (loadObs) loadObs.observe(card);

      // video.load() でデコーダ解放 → メインスレッドブロックを防ぐため idle 時に先送り
      const ric = typeof requestIdleCallback !== 'undefined' ? requestIdleCallback : (fn) => setTimeout(fn, 0);
      ric(() => { if (!video.src) video.load(); }, { timeout: 2000 });
    }

    // ── Observer 初期化 ─────────────────────────────
    function initObservers() {
      if (loadObs)    loadObs.disconnect();
      if (playObs)    playObs.disconnect();
      if (releaseObs) releaseObs.disconnect();

      // ① LOAD_MARGIN 以内 → キューに積む（スクロール中でも止めない）
      loadObs = new IntersectionObserver((entries) => {
        for (const e of entries) {
          if (!e.isIntersecting) continue;
          const card = e.target;
          if (card._video.src) continue;
          loadObs.unobserve(card);
          enqueue(card);
        }
      }, { root: grid, rootMargin: LOAD_MARGIN });

      // ② ビューポート内 → rAF 経由で再生 / 外 → 即時一時停止
      playObs = new IntersectionObserver((entries) => {
        for (const e of entries) {
          const card  = e.target;
          const video = card._video;
          if (!video) continue;
          card._inVP = e.isIntersecting;
          if (e.isIntersecting) {
            if (video.src) {
              requestAnimationFrame(() => {
                if (video.src && card.isConnected) video.play().catch(() => {});
              });
            }
          } else {
            video.pause();
          }
        }
      }, { root: grid, threshold: 0.1 });

      // ③ RELEASE_MARGIN を超えたら src 解放
      releaseObs = new IntersectionObserver((entries) => {
        for (const e of entries) {
          if (e.isIntersecting) continue;
          releaseCard(e.target);
        }
      }, { root: grid, rootMargin: RELEASE_MARGIN });
    }

    // ── DOM 参照 ─────────────────────────────────────
    const grid         = document.getElementById('grid');
    const emptyEl      = document.getElementById('empty');
    const openBtn      = document.getElementById('open-btn');
    const emptyBtn     = document.getElementById('empty-btn');
    const sizeRange    = document.getElementById('size-range');
    const sizeValEl    = document.getElementById('size-val');
    const folderNameEl = document.getElementById('folder-name');
    const totalCountEl = document.getElementById('total-count');

    // ── サイズスライダー ──────────────────────────────
    sizeRange.addEventListener('input', () => {
      const v = sizeRange.value;
      sizeValEl.textContent = v;
      grid.style.setProperty('--cs', v + 'px');
    });

    // ── フォルダを開く ────────────────────────────────
    async function openFolder() {
      openBtn.disabled = true;
      emptyBtn.disabled = true;
      try {
        const path = await window.go.main.App.SelectFolder();
        if (!path) return;

        const [port, count] = await Promise.all([
          window.go.main.App.StartVideoServer(path),
          window.go.main.App.GetTotalVideoCount(path),
        ]);

        folderPath = path;
        videoPort  = port;
        totalCount = count;
        offset     = 0;

        const name = path.replace(/\\/g, '/').split('/').filter(Boolean).pop() || path;
        folderNameEl.textContent = name;
        totalCountEl.textContent = count > 0 ? count + ' 本' : '';

        resetGrid();
        initObservers();

        if (count === 0) {
          emptyEl.querySelector('p').textContent = '動画ファイルが見つかりません';
          emptyEl.style.display = 'flex';
          grid.style.display    = 'none';
          return;
        }

        emptyEl.style.display = 'none';
        grid.style.display    = 'grid';

        const sentinel = document.createElement('div');
        sentinel.id = 'sentinel';
        grid.appendChild(sentinel);

        if (sentinelObs) sentinelObs.disconnect();
        sentinelObs = new IntersectionObserver(([e]) => {
          if (e.isIntersecting) loadMore();
        }, { root: grid, rootMargin: '400px' });
        sentinelObs.observe(sentinel);

        await loadMore();
      } catch (err) {
        console.error('openFolder:', err);
      } finally {
        openBtn.disabled = false;
        emptyBtn.disabled = false;
      }
    }

    // ── グリッドリセット ──────────────────────────────
    function resetGrid() {
      if (loadObs)    loadObs.disconnect();
      if (playObs)    playObs.disconnect();
      if (releaseObs) releaseObs.disconnect();
      if (sentinelObs) { sentinelObs.disconnect(); sentinelObs = null; }

      // キューをクリア
      queueArr.length = 0;
      queueSet.clear();
      queueHead   = 0;
      activeLoads = 0;

      grid.querySelectorAll('video').forEach(v => {
        v.pause();
        v.removeAttribute('src');
        v.load();
      });

      isLoading = false;
      grid.innerHTML = '';
    }

    // ── バッチ読み込み ────────────────────────────────
    async function loadMore() {
      if (isLoading || offset >= totalCount) return;
      isLoading = true;

      const sentinel   = document.getElementById('sentinel');
      const loadingRow = document.createElement('div');
      loadingRow.className = 'loading-row';
      loadingRow.innerHTML = '<div class="ring"></div>';
      if (sentinel) grid.insertBefore(loadingRow, sentinel);
      else          grid.appendChild(loadingRow);

      try {
        const names = await window.go.main.App.GetVideoFiles(folderPath, offset, BATCH);
        loadingRow.remove();

        if (names && names.length > 0) {
          const frag = document.createDocumentFragment();
          for (const name of names) {
            const url = `http://127.0.0.1:${videoPort}/${encodeURIComponent(name)}`;
            frag.appendChild(createCard(name, url));
          }
          if (sentinel) grid.insertBefore(frag, sentinel);
          else          grid.appendChild(frag);
          offset += names.length;
        }

        if (sentinel && offset >= totalCount) sentinel.style.display = 'none';
      } catch (err) {
        console.error('loadMore:', err);
        loadingRow.remove();
      } finally {
        isLoading = false;
      }
    }

    // ── カード生成 ────────────────────────────────────
    function createCard(name, url) {
      const card = document.createElement('div');
      card.className  = 'card';
      card.title      = name;
      card._url       = url;
      card._name      = name;
      card._inVP      = false; // ビューポート内フラグ（getBoundingClientRect 不要にする）
      card._dragging  = false;

      const video = document.createElement('video');
      video.muted       = true;
      video.loop        = true;
      video.playsInline = true;
      video.preload     = 'none';
      card._video = video;

      video.addEventListener('dragstart', (e) => e.preventDefault());

      card.addEventListener('mouseenter', () => { if (!card._dragging) video.muted = false; });
      card.addEventListener('mouseleave', () => { video.muted = true; });

      // ドラッグ
      card.draggable = true;
      card.addEventListener('dragstart', (e) => {
        card._dragging = true;
        card.classList.add('dragging');
        video.muted = true;
        const slash   = folderPath.replace(/\\/g, '/');
        const fileUri = 'file:///' + slash + '/' + name.replace(/ /g, '%20');
        e.dataTransfer.effectAllowed = 'copy';
        e.dataTransfer.setData('text/plain',    folderPath + '\\' + name);
        e.dataTransfer.setData('text/uri-list', fileUri);
        e.dataTransfer.setDragImage(card, 16, 16);
      });
      card.addEventListener('dragend', () => {
        card._dragging = false;
        card.classList.remove('dragging');
      });

      // 右クリック
      card.addEventListener('contextmenu', (e) => {
        e.preventDefault();
        e.stopPropagation();
        showCtxMenu(e.clientX, e.clientY, card);
      });

      // アスペクト比更新: rAF でレイアウト変更をフレーム境界にまとめる（強制 reflow 回避）
      video.addEventListener('loadedmetadata', () => {
        if (video.videoWidth && video.videoHeight) {
          const pb = (video.videoHeight / video.videoWidth * 100).toFixed(4) + '%';
          requestAnimationFrame(() => { if (card.isConnected) card.style.paddingBottom = pb; });
        }
      }, { once: true });

      // スピナー
      const spin = document.createElement('div');
      spin.className = 'card-spin';
      spin.innerHTML = '<div class="ring"></div>';
      spin.style.display = 'none';
      card._spin = spin;

      card.appendChild(video);
      card.appendChild(spin);

      loadObs.observe(card);
      playObs.observe(card);
      releaseObs.observe(card);

      return card;
    }

    openBtn .addEventListener('click', openFolder);
    emptyBtn.addEventListener('click', openFolder);

    // ── コンテキストメニュー ──────────────────────────
    const ctxMenu = document.getElementById('ctx-menu');
    let ctxCard   = null;

    function showCtxMenu(x, y, card) {
      ctxCard = card;
      ctxMenu.style.left = x + 'px';
      ctxMenu.style.top  = y + 'px';
      ctxMenu.classList.add('show');
      const r = ctxMenu.getBoundingClientRect();
      if (r.right  > window.innerWidth)  ctxMenu.style.left = (x - r.width)  + 'px';
      if (r.bottom > window.innerHeight) ctxMenu.style.top  = (y - r.height) + 'px';
    }

    function hideCtxMenu() {
      ctxMenu.classList.remove('show');
      ctxCard = null;
    }

    document.addEventListener('click',       (e) => { if (!ctxMenu.contains(e.target)) hideCtxMenu(); });
    document.addEventListener('contextmenu', (e) => { if (!e.target.closest('.card'))  hideCtxMenu(); });
    document.addEventListener('keydown',     (e) => { if (e.key === 'Escape') hideCtxMenu(); });

    document.getElementById('ctx-reveal').addEventListener('click', () => {
      if (!ctxCard) return;
      window.go.main.App.RevealInExplorer(ctxCard._name).catch(() => {});
      hideCtxMenu();
    });

    document.getElementById('ctx-copy-path').addEventListener('click', () => {
      if (!ctxCard) return;
      const full = folderPath + (folderPath.endsWith('\\') ? '' : '\\') + ctxCard._name;
      navigator.clipboard.writeText(full).catch(() => {});
      hideCtxMenu();
    });

    document.getElementById('ctx-delete').addEventListener('click', async () => {
      if (!ctxCard) return;
      const card = ctxCard;
      hideCtxMenu();
      if (!confirm(`「${card._name}」を削除しますか？\n\nこの操作は元に戻せません（ゴミ箱には入りません）。`)) return;
      try {
        await window.go.main.App.DeleteFile(card._name);
        if (loadObs)    loadObs.unobserve(card);
        if (playObs)    playObs.unobserve(card);
        if (releaseObs) releaseObs.unobserve(card);
        dequeue(card);
        const v = card._video;
        if (v) { v.pause(); v.removeAttribute('src'); v.load(); }
        card.remove();
        totalCount = Math.max(0, totalCount - 1);
        offset     = Math.max(0, offset     - 1);
        totalCountEl.textContent = totalCount > 0 ? totalCount + ' 本' : '';
      } catch (err) {
        alert('削除に失敗しました:\n' + err);
      }
    });

    // ── アップデート処理 ──────────────────────────────
    const updateScreen  = document.getElementById('update-screen');
    const updateMsg     = document.getElementById('update-msg');
    const updateBarWrap = document.getElementById('update-bar-wrap');
    const updateBar     = document.getElementById('update-bar');
    const updateVersion = document.getElementById('update-version');

    function hideUpdateScreen() { updateScreen.classList.add('hidden'); }

    function initUpdateCheck() {
      if (!window.runtime || !window.go?.main?.App) {
        setTimeout(initUpdateCheck, 30);
        return;
      }
      window.runtime.EventsOn('update:none',      ()        => { hideUpdateScreen(); });
      window.runtime.EventsOn('update:available', (version) => {
        updateMsg.textContent = version + ' をダウンロード中...';
        updateBarWrap.classList.add('visible');
      });
      window.runtime.EventsOn('update:progress',  (pct)     => { updateBar.style.width = pct + '%'; });
      window.runtime.EventsOn('update:done',      ()        => {
        updateBar.style.width = '100%';
        updateMsg.textContent = 'アップデート完了！再起動中...';
      });
      window.runtime.EventsOn('update:error', () => {});
      window.go.main.App.StartUpdateCheck();
    }

    initUpdateCheck();
  </script>
</body>
</html>
